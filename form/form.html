<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="../styles/styles.css">
  </head>
  <body>
    <header>
      <div class="container">
    <div class="block">
      <h1 padding="30px">
        Conquerors of the World
      </h1>
    </div>
    <div class="block" position="absolute">
      <a font-size="40px" top="50%" href="alphaversion.html">Alpha Version</a>
      <a font-size="40px" top="50%" href="betaversion.html">Upcoming Beta version</a>
      <a font-size="40px" top="50%" href="about.html">About Us</a>
      <a font-size="40px" top="50%" href="gamerules.html">Game Rules</a>
    </div>
  </div>
    </header>
    <main>
      <form action="form.js" method="get">
        <fieldset>
          <legend>Personal information</legend>
          <label for="name">
            Name:
            <input type="text" id="name" name="name" required>
          </label>
          <label for="email">
            Email address:
            <input type="email" id="email" name="email" required>
          </label>
        </fieldset>
        <fieldset>
          <legend>Feedback</legend>
          <label for="feedback-type">
            <select id="feedback-type" name="feedback-type">
              <option value=" "></option>
              <option value="suggestion">Suggestion</option>
              <option value="bug">Bug</option>
              <option value="compliment">Compliment</option>
            </select>
          </label>
          <label for="feedback">
            <textarea name="feedback" rows="4" cols="40" id="feedback"></textarea>
          </label>
        </fieldset>
        <input type="submit">
      </form>
    </main>
    <footer>
      <h3>Pages</h3>
  <ul>
    <li>
      <a href="alphaversion.html">Alpha Version</a>
    </li>
    <li>
      <a href="betaversion.html">Upcoming Beta version</a>
    </li>
    <li>
      <a href="about.html">About Us</a>
    </li>
    <li>
      <a href="gamerules.html">Game Rules</a>
    </li>
  </ul>
    </footer>
  </body>
</html>
